<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Tita</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to bottom, #ff9ecf, #ff4da6);
    font-family: Arial, sans-serif;
    text-align: center;
}

/* Mensaje principal */
h1 {
    margin-top: 80px;
    color: white;
    font-size: 32px;
    text-shadow: 2px 2px 5px #000;
}

/* Botón */
button {
    margin-top: 30px;
    padding: 15px 35px;
    font-size: 18px;
    background: #ff1493;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 10px #fff;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Corazones fondo */
.bg-heart {
    position: absolute;
    color: rgba(255,255,255,0.3);
    font-size: 20px;
    animation: float 10s linear infinite;
}

/* Corazones al hacer click */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: fall 4s linear infinite;
}

/* Animaciones */
@keyframes fall {
    0% { transform: translateY(-10px); opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}

/* Mensaje bonito */
#mensaje {
    margin-top: 20px;
    font-size: 22px;
    color: white;
    display: none;
    animation: fadeIn 2s;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>

</head>
<body>

<h1>NO TE OLVIDO Y TAMPOCO TUS BESOS</h1>

<button onclick="accion()">Click aquí</button>

<div id="mensaje">
    Perdóname Tita 💔<br><br>
    <a href="https://share.google/LAwSCk589ywoOjevn" target="_blank" style="color:white;">
        https://share.google/LAwSCk589ywoOjevn
    </a>
</div>

<script>

/* Corazones de fondo con "Tita" */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "bg-heart";
    heart.innerHTML = "❤ Tita";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 15 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 5 + 5) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 10000);
}, 300);

/* Acción del botón */
function accion() {

    // Mostrar mensaje bonito en vez de alert
    document.getElementById("mensaje").style.display = "block";

    // Voz personalizada (Te quiero mucho)
    let msg = new SpeechSynthesisUtterance("Te quiero mucho");
    speechSynthesis.speak(msg);

    // Lluvia de corazones
    for (let i = 0; i < 80; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "❤";
        heart.classList.add("heart");

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 25 + 10) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
    }
}

</script>

</body>
</html>
